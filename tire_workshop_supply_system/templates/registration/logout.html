<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выход из системы - Снабжение шиномонтажа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logout-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .logout-header {
            margin-bottom: 30px;
        }

        .logout-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .logout-header h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .logout-header p {
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .logout-message {
            background: #fff3cd;
            color: #856404;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #ffc107;
            font-size: 16px;
            font-weight: 500;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-yes {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }

        .btn-yes:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }

        .btn-no {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: white;
        }

        .btn-no:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.4);
        }

        .logout-footer {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .logout-footer p {
            color: #7f8c8d;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <div class="logout-header">
            <div class="logout-icon">🚪</div>
            <h1>Выход из системы</h1>
        </div>

        <div class="logout-message">
            Вы уверены, что хотите выйти?
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="button-group">
                <button type="submit" name="action" value="no" class="btn btn-no">Нет</button>
                <button type="submit" name="action" value="yes" class="btn btn-yes">Да</button>
            </div>
        </form>

        <div class="logout-footer">
            <p>© 2024 Система снабжения шиномонтажной мастерской</p>
        </div>
    </div>
</body>
</html>
